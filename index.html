<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Белая дача — Доставка овощей</title>
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    :root {
      --accent: #2E7D32;
      --accent-light: #43A047;
      --accent-dark: #1B5E20;
      --cta: #FF6D00;
      --cta-hover: #E65100;
      --bg: #FAFAFA;
      --surface: #FFFFFF;
      --text: #1C1C1E;
      --text-sec: #8E8E93;
      --border: #F2F2F7;
      --radius: 20px;
      --radius-lg: 28px;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 100px;
    }

    /* Hero */
    .hero {
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-light) 100%);
      padding: 48px 24px 32px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -30%;
      width: 80%;
      height: 150%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.1) 0%, transparent 70%);
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.2);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
    }
    .hero h1 {
      color: white;
      font-size: 32px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .hero p {
      color: rgba(255,255,255,0.85);
      font-size: 16px;
      line-height: 1.4;
      margin-bottom: 24px;
    }
    .hero-stats {
      display: flex;
      gap: 24px;
    }
    .hero-stat { text-align: center; }
    .hero-stat-val {
      color: white;
      font-size: 20px;
      font-weight: 800;
    }
    .hero-stat-label {
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      margin-top: 2px;
    }

    /* Category sections */
    .category-section { padding: 24px 0 0; }
    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      margin-bottom: 16px;
    }
    .category-title {
      font-size: 20px;
      font-weight: 700;
    }
    .category-count {
      font-size: 13px;
      color: var(--text-sec);
      background: var(--border);
      padding: 4px 10px;
      border-radius: 12px;
    }

    /* Horizontal scroll products */
    .products-scroll {
      display: flex;
      gap: 12px;
      padding: 0 20px 8px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
    }
    .products-scroll::-webkit-scrollbar { display: none; }
    
    .product-card {
      flex: 0 0 160px;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      scroll-snap-align: start;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .product-card-wide {
      flex: 0 0 220px;
    }
    .product-card-wide .product-img-wrap {
      height: 140px;
    }
    .product-img-wrap {
      width: 100%;
      height: 120px;
      background: #E8F5E9;
      overflow: hidden;
    }
    .product-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .product-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: var(--accent);
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 8px;
    }
    .product-info { padding: 12px; }
    .product-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .product-sub {
      font-size: 12px;
      color: var(--text-sec);
      margin-bottom: 8px;
    }
    .product-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .product-price {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
    }
    .product-price small {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-sec);
    }
    .product-add {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      border: none;
      font-size: 22px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
    }
    .product-add:active {
      transform: scale(0.9);
    }

    /* Cart bar */
    .cart-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      padding: 16px 20px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      display: none;
      align-items: center;
      gap: 16px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
      z-index: 100;
    }
    .cart-bar.visible { display: flex; }
    .cart-bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }
    .cart-icon {
      width: 44px;
      height: 44px;
      background: var(--accent);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      position: relative;
    }
    .cart-icon .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--cta);
      color: white;
      font-size: 11px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }
    .cart-bar-info { font-size: 13px; font-weight: 500; opacity: 0.8; }
    .cart-bar-price { font-size: 18px; font-weight: 800; }
    .cart-bar-btn {
      background: var(--cta);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    /* Cart overlay */
    .cart-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .cart-overlay.active { display: flex; }
    .cart-sheet {
      background: var(--surface);
      width: 100%;
      max-width: 500px;
      max-height: 85vh;
      border-radius: 24px 24px 0 0;
      overflow-y: auto;
      padding: 24px 20px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }
    .cart-sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .cart-sheet-title { font-size: 22px; font-weight: 800; }
    .cart-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--border);
      border: none;
      font-size: 18px;
      cursor: pointer;
    }
    .cart-empty { text-align: center; padding: 40px 0; color: var(--text-sec); }
    .cart-empty-icon { font-size: 48px; margin-bottom: 12px; }
    .cart-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .cart-item-img {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: #E8F5E9;
      overflow: hidden;
    }
    .cart-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .cart-item-price { font-size: 16px; font-weight: 700; color: var(--accent); }
    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .qty-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: white;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qty-val { font-size: 16px; font-weight: 700; min-width: 20px; text-align: center; }
    .cart-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      font-size: 18px;
      font-weight: 800;
    }
    .cart-submit {
      width: 100%;
      background: var(--cta);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    /* Order form */
    .order-form {
      display: none;
      padding: 20px;
      max-width: 500px;
      margin: 0 auto;
    }
    .order-form.active { display: block; }
    .order-form h2 { font-size: 22px; font-weight: 800; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-sec);
      margin-bottom: 6px;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 14px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: var(--accent);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .order-summary {
      background: var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .order-summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .order-summary-total {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      font-weight: 800;
      padding-top: 8px;
      border-top: 1px solid rgba(0,0,0,0.1);
    }
    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-back {
      width: 100%;
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
      padding: 14px;
      border-radius: 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }

    /* Success screen */
    .success-screen {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }
    .success-screen.active { display: block; }
    .success-icon { font-size: 64px; margin-bottom: 16px; }
    .success-screen h2 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    .success-screen p { color: var(--text-sec); margin-bottom: 24px; }
    #success-details { font-size: 14px; color: var(--text); text-align: left; background: var(--border); padding: 16px; border-radius: 14px; }
  </style>
</head>
<body>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-badge">🚜 Фермерский урожай</div>
    <h1>Белая дача</h1>
    <p>Свежие овощи прямо с грядки. Доставка на следующий день.</p>
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-val">7</div>
        <div class="hero-stat-label">позиций</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-val">24ч</div>
        <div class="hero-stat-label">доставка</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-val">100%</div>
        <div class="hero-stat-label">свежее</div>
      </div>
    </div>
  </div>

  <!-- Catalog section -->
  <div id="catalog-view">
    <div class="category-section">
      <div class="category-header">
        <div class="category-title">🥬 Все овощи</div>
        <div class="category-count">7 товаров</div>
      </div>
      <div class="products-scroll" id="scroll-main"></div>
    </div>
  </div>

  <!-- Cart overlay -->
  <div class="cart-overlay" id="cart-overlay">
    <div class="cart-sheet">
      <div class="cart-sheet-header">
        <div class="cart-sheet-title">🛒 Корзина</div>
        <button class="cart-close" onclick="closeCart()">✕</button>
      </div>
      <div id="cart-items"></div>
      <div class="cart-total">
        <span>Итого:</span>
        <span id="cart-total-price">0 ₽</span>
      </div>
      <button class="cart-submit" onclick="goToOrder()">Оформить заказ</button>
    </div>
  </div>

  <!-- Order form -->
  <div class="order-form" id="order-form">
    <h2>📦 Оформление заказа</h2>
    <div class="order-summary" id="order-summary"></div>
    <div class="form-group">
      <label>Имя</label>
      <input type="text" id="f-name" required placeholder="Как к вам обращаться?">
    </div>
    <div class="form-group">
      <label>Телефон</label>
      <input type="tel" id="f-phone" required placeholder="+7 (___) ___-__-__">
    </div>
    <div class="form-group">
      <label>Дата доставки</label>
      <input type="date" id="f-date" required>
    </div>
    <div class="form-group">
      <label>Комментарий (необязательно)</label>
      <textarea id="f-comment" placeholder="Пожелания к заказу..."></textarea>
    </div>
    <button class="btn-submit" onclick="submitOrder()">Отправить заказ</button>
    <button class="btn-back" onclick="backToCart()">← Назад в корзину</button>
  </div>

  <!-- Success -->
  <div class="success-screen" id="success-screen">
    <div class="success-icon">✅</div>
    <h2>Заказ принят!</h2>
    <p>Мы свяжемся с вами для подтверждения.</p>
    <div id="success-details"></div>
  </div>

  <!-- Cart bar -->
  <div class="cart-bar" id="cart-bar">
    <div class="cart-bar-left">
      <div class="cart-icon">
        🛒
        <div class="badge" id="cart-badge">0</div>
      </div>
      <div>
        <div class="cart-bar-info">В корзине</div>
        <div class="cart-bar-price" id="cart-bar-price">0 ₽</div>
      </div>
    </div>
    <button class="cart-bar-btn" onclick="openCart()">Перейти →</button>
  </div>

<script>
const IMG_URL = 'https://tutbeton-collab.github.io/white-dacha-shop/images/';

const PRODUCTS = [
  { id: 0, name: 'Томаты', price: 500, unit: 'ведро', emoji: '🍅', img: IMG_URL + 'product_0_full.png' },
  { id: 1, name: 'Перец', price: 200, unit: 'ведро', emoji: '🫑', img: IMG_URL + 'product_1_full.png' },
  { id: 2, name: 'Огурец', price: 500, unit: 'ведро', emoji: '🥒', img: IMG_URL + 'product_2_full.png' },
  { id: 3, name: 'Арбуз', price: 200, unit: 'шт', emoji: '🍉', img: IMG_URL + 'product_3_full.png' },
  { id: 4, name: 'Горький перец', price: 100, unit: '12 шт', emoji: '🌶️', img: IMG_URL + 'product_4_full.png' },
  { id: 5, name: 'Баклажан', price: 300, unit: 'ведро', emoji: '🍆', img: IMG_URL + 'product_5_full.png' },
  { id: 6, name: 'Тыква', price: 35, unit: 'кг', emoji: '🎃', img: IMG_URL + 'product_6_full.png' }
];

let cart = {};

function init() {
  if (window.WebApp) { window.WebApp.ready(); }
  
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  document.getElementById('f-date').min = tomorrow.toISOString().split('T')[0];
  document.getElementById('f-date').value = document.getElementById('f-date').min;
  
  // Auto-fill name from MAX user
  if (window.WebApp && window.WebApp.initData && window.WebApp.initData.user) {
    const user = window.WebApp.initData.user;
    const nameEl = document.getElementById('f-name');
    if (nameEl && user.first_name) {
      nameEl.value = user.first_name + (user.last_name ? ' ' + user.last_name : '');
    }
  }
  
  renderAll();
}

function renderAll() {
  renderScroll('scroll-main', PRODUCTS, true);
}

function renderScroll(containerId, items, wide) {
  const container = document.getElementById(containerId);
  container.innerHTML = items.map(p => `
    <div class="product-card ${wide ? 'product-card-wide' : ''}" style="position:relative">
      <div class="product-img-wrap">
        <img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy" 
             onerror="this.style.display='none';this.parentElement.style.background='linear-gradient(135deg,#E8F5E9,#F1F8E9)';this.parentElement.innerHTML='<span style=\\'font-size:56px;display:flex;align-items:center;justify-content:center;height:100%\\'>${p.emoji}</span>'">
      </div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-bottom">
          <div class="product-price">${p.price} ₽<small>/${p.unit}</small></div>
          <button class="product-add" onclick="addToCart(${p.id})">+</button>
        </div>
      </div>
    </div>
  `).join('');
}

function addToCart(id) {
  if (!cart[id]) cart[id] = 0;
  cart[id]++;
  updateCart();
  if (window.WebApp?.HapticFeedback) window.WebApp.HapticFeedback.impactOccurred('light');
}

function removeFromCart(id) {
  if (cart[id]) {
    cart[id]--;
    if (cart[id] <= 0) delete cart[id];
  }
  updateCart();
}

function updateCart() {
  const items = Object.entries(cart);
  const totalCount = items.reduce((s, [, q]) => s + q, 0);
  const totalPrice = items.reduce((s, [id, q]) => {
    const p = PRODUCTS.find(x => x.id == id);
    return s + (p ? p.price * q : 0);
  }, 0);
  
  document.getElementById('cart-badge').textContent = totalCount;
  document.getElementById('cart-bar-price').textContent = totalPrice + ' ₽';
  
  if (totalCount > 0) {
    document.getElementById('cart-bar').classList.add('visible');
  } else {
    document.getElementById('cart-bar').classList.remove('visible');
  }
}

function openCart() {
  const container = document.getElementById('cart-items');
  const items = Object.entries(cart);
  
  if (items.length === 0) {
    container.innerHTML = '<div class="cart-empty"><div class="cart-empty-icon">🛒</div><p>Корзина пуста</p></div>';
    document.getElementById('cart-total-price').textContent = '0 ₽';
  } else {
    container.innerHTML = items.map(([id, qty]) => {
      const x = PRODUCTS.find(p => p.id == id);
      return `
        <div class="cart-item">
          <div class="cart-item-img">
            <img src="${x.img}" alt="${x.name}" onerror="this.style.display='none';this.parentElement.innerHTML='${x.emoji}';this.parentElement.style.fontSize='32px';this.parentElement.style.display='flex';this.parentElement.style.alignItems='center';this.parentElement.style.justifyContent='center'">
          </div>
          <div class="cart-item-info">
            <div class="cart-item-name">${x.name}</div>
            <div class="cart-item-price">${x.price} ₽/${x.unit}</div>
          </div>
          <div class="cart-item-qty">
            <button class="qty-btn" onclick="removeFromCart(${id})">−</button>
            <div class="qty-val">${qty}</div>
            <button class="qty-btn" onclick="addToCart(${id})">+</button>
          </div>
        </div>
      `;
    }).join('');
    
    const total = items.reduce((s, [id, q]) => {
      const p = PRODUCTS.find(x => x.id == id);
      return s + (p ? p.price * q : 0);
    }, 0);
    document.getElementById('cart-total-price').textContent = total + ' ₽';
  }
  
  document.getElementById('cart-overlay').classList.add('active');
}

function closeCart() {
  document.getElementById('cart-overlay').classList.remove('active');
}

function goToOrder() {
  closeCart();
  document.getElementById('catalog-view').style.display = 'none';
  document.getElementById('cart-bar').style.display = 'none';
  document.getElementById('order-form').classList.add('active');
  
  const items = Object.entries(cart);
  const total = items.reduce((s, [id, q]) => {
    const p = PRODUCTS.find(x => x.id == id);
    return s + (p ? p.price * q : 0);
  }, 0);
  
  document.getElementById('order-summary').innerHTML = items.map(([id, q]) => {
    const p = PRODUCTS.find(x => x.id == id);
    return `<div class="order-summary-row"><span>${p.name} × ${q}</span><span>${p.price * q} ₽</span></div>`;
  }).join('') + `<div class="order-summary-total"><span>Итого</span><span>${total} ₽</span></div>`;
}

function backToCart() {
  document.getElementById('order-form').classList.remove('active');
  document.getElementById('catalog-view').style.display = '';
  if (Object.keys(cart).length > 0) document.getElementById('cart-bar').style.display = '';
  openCart();
}

function submitOrder() {
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const date = document.getElementById('f-date').value;
  const comment = document.getElementById('f-comment').value.trim();
  
  if (!name || !phone) {
    alert('Заполните имя и телефон');
    return;
  }
  
  const items = Object.entries(cart).map(([id, q]) => {
    const p = PRODUCTS.find(x => x.id == id);
    return `${p.name} × ${q} = ${p.price * q} ₽`;
  }).join('\n');
  
  const total = Object.entries(cart).reduce((s, [id, q]) => {
    const p = PRODUCTS.find(x => x.id == id);
    return s + (p ? p.price * q : 0);
  }, 0);
  
  const orderText = `НОВЫЙ ЗАКАЗ\n\n👤 ${name}\n📱 ${phone}\n📅 ${date}\n\n${items}\n\n💰 Итого: ${total} ₽\n${comment ? '\n💬 ' + comment : ''}`;
  
  // Send to bot server
  fetch('http://31.76.225.127:8091/api/orders', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, phone, date, comment, items, total })
  }).catch(() => {});
  
  // Also send via WebApp if available
  if (window.WebApp && window.WebApp.callEvent) {
    window.WebApp.callEvent('order', { name, phone, date, comment, items, total });
  }
  
  document.getElementById('order-form').classList.remove('active');
  document.getElementById('success-screen').classList.add('active');
  document.getElementById('success-details').innerHTML = `<pre style="white-space:pre-wrap;font-family:inherit">${orderText}</pre>`;
  
  cart = {};
  updateCart();
}

init();
</script>
</body>
</html>
