<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Белая дача — Магазин</title>
<style>
body{font-family:-apple-system,sans-serif;background:#1a1a1a;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px}
h1{font-size:28px;margin-bottom:8px;text-align:center}
.sub{color:#888;margin-bottom:40px;text-align:center;font-size:14px}
.cards{display:flex;flex-direction:column;gap:16px;width:100%;max-width:400px}
.card{background:#2a2a2a;border-radius:16px;padding:24px;text-decoration:none;color:#fff;border:1px solid #3a3a3a;transition:transform .15s,border-color .15s}
.card:active{transform:scale(.98);border-color:#4a4a4a}
.card h2{font-size:18px;margin-bottom:6px}
.card p{font-size:13px;color:#888;line-height:1.4}
.card .tag{display:inline-block;background:rgba(76,175,80,.2);color:#4CAF50;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;margin-top:12px}
</style>
</head>
<body>
<h1>🌿 Белая дача</h1>
<p class="sub">Выберите версию магазина</p>
<div class="cards">
<a class="card" href="v3/">
<h2>🚀 Стиль доставки</h2>
<p>Hero-баннер, горизонтальный скролл, нижняя панель корзины</p>
<span class="tag">Рекомендуем</span>
</a>
<a class="card" href="v2/">
<h2>📱 Современный UI</h2>
<p>Сетка карточек, категории, поиск, бейджи</p>
<span class="tag">Альтернатива</span>
</a>
</div>
</body>
</html>
