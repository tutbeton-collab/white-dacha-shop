<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Белая дача — Выбор дизайна</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 40px 20px; text-align: center; }
    h1 { font-size: 28px; margin-bottom: 8px; color: #333; }
    .subtitle { font-size: 16px; color: #666; margin-bottom: 40px; }
    .cards { display: flex; flex-direction: column; gap: 16px; max-width: 400px; margin: 0 auto; }
    .card { background: white; border-radius: 16px; padding: 24px; text-decoration: none; color: inherit; box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: transform 0.2s, box-shadow 0.2s; }
    .card:active { transform: scale(0.98); }
    .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
    .card h2 { font-size: 20px; margin-bottom: 8px; }
    .card p { font-size: 14px; color: #666; line-height: 1.4; }
    .card .badge { display: inline-block; background: #4CAF50; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 12px; }
    .card.v3 .badge { background: #FF6D00; }
  </style>
</head>
<body>
  <h1>🌿 Белая дача</h1>
  <p class="subtitle">Выбери вариант дизайна магазина</p>
  
  <div class="cards">
    <a href="/white-dacha-shop/v2/" class="card v2">
      <h2>Вариант 2</h2>
      <p>Современный UI — сетка карточек, категории, поиск, бейджи</p>
      <span class="badge">Открыть →</span>
    </a>
    
    <a href="/white-dacha-shop/v3/" class="card v3">
      <h2>Вариант 3</h2>
      <p>Стиль доставки еды — hero-баннер, горизонтальный скролл, нижняя панель</p>
      <span class="badge">Открыть →</span>
    </a>
  </div>
</body>
</html>
